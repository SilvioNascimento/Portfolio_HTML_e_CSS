name: Deploy do link do formspree para Vercel

on:
  push:
    branches:
      - main  # Ou o nome da sua branch principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar o arquivo env.js dinamicamente
        run: |
          mkdir -p js
          echo "document.addEventListener('DOMContentLoaded', () => { const f = document.getElementById('form-contato'); if(f) f.action = '${{ secrets.FORMSPREE_LINK }}'; });" > js/env.js

      - name: Deploy do link do formspree para Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'